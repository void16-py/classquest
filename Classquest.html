<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClassQuest — Class 9 CBSE Quiz Game</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📚</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}

body{
  background:#090514;
  background-image:
    radial-gradient(at 50% 0%, var(--subject-glow, rgba(167,139,250,0.08)) 0px, transparent 60%),
    linear-gradient(rgba(167,139,250,.01) 1px,transparent 1px),
    linear-gradient(90deg,rgba(167,139,250,.01) 1px,transparent 1px);
  background-size:100% 100%, 40px 40px, 40px 40px;
  color:#f1ecfb;
  font-family:'Segoe UI', system-ui, -apple-system, sans-serif;
  display:flex;
  justify-content:center;
  padding:24px 16px 60px;
  min-height:100vh;
  -webkit-font-smoothing:antialiased;
  transition: background 0.5s ease; 
  overflow-x: hidden;
}

/* INTRO SPLASH SCREEN STYLES */
#intro-splash {
  position: fixed;
  top: 0; left: 0; width: 100vw; height: 100vh;
  background: #090514;
  display: flex; align-items: center; justify-content: center;
  color: #c4b5fd; font-size: 2.8rem; font-weight: 950; letter-spacing: 3px;
  z-index: 9999; pointer-events: none;
  animation: splashFadeOut 0.8s ease 3s forwards; 
}

@keyframes splashFadeOut {
  to { opacity: 0; visibility: hidden; filter: blur(15px); }
}

/* MAIN APP WINDOW CONTAINER */
#app{
  width:100%;max-width:640px;
  opacity: 0;
  animation: appReveal 0.6s ease 3.2s forwards;
}

@keyframes appReveal {
  to { opacity: 1; }
}

/* DYNAMIC DIRECTIONAL MULTI-AXIS LETTER REVEAL */
.anim-char {
  display: inline-block;
  opacity: 0;
  filter: blur(12px);
  animation: letterReveal 1.2s cubic-bezier(0.19, 1, 0.22, 1) forwards;
}

/* Letters screen ke bohot bahar se ghumte hue udkar aayenge */
.from-top    { transform: translateY(-400px) scale(0) rotate(-180deg); }
.from-bottom { transform: translateY(400px) scale(0) rotate(180deg); }
.from-left   { transform: translateX(-400px) scale(0) rotate(-120deg); }
.from-right  { transform: translateX(400px) scale(0) rotate(120deg); }

@keyframes letterReveal {
  to {
    opacity: 1;
    transform: translate(0, 0) scale(1) rotate(0deg);
    filter: blur(0px);
  }
}

/* TOPICS CHAPTER PILLS */
@keyframes topicFade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.topics-wrap{animation:topicFade .3s cubic-bezier(0.4, 0, 0.2, 1)}

/* HOME SCREEN ULTRA BEAUTIFICATION */
.home{display:flex;flex-direction:column;gap:28px;padding-top:14px}
.brand{text-align:center;padding:12px 0 16px}
.brand-name{
  font-size:3.5rem;
  font-weight: 950;
  letter-spacing:-2px;
  line-height:1;
  background:linear-gradient(135deg, #c4b5fd 0%, #a78bfa 35%, #f472b6 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  -webkit-text-stroke: 1.2px rgba(196, 181, 253, 0.4);
  filter: drop-shadow(0 0 20px rgba(167,139,250,0.6)) drop-shadow(0 2px 4px rgba(0,0,0,0.5));
}
.brand-sub{
  margin-top:10px;
  font-size:.75rem;
  font-weight:800;
  letter-spacing:5px;
  text-transform:uppercase;
  color:#8572b4;
}

.sh{
  font-size:.72rem;
  font-weight:800;
  letter-spacing:2.5px;
  text-transform:uppercase;
  color:#8b7aa1;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
}
.sh-badge{
  font-size:.65rem;
  font-weight:700;
  letter-spacing:0.5px;
  text-transform:none;
  background:rgba(167,139,250,.18);
  color:#c4b5fd;
  padding:3px 10px;
  border-radius:99px;
  border:1px solid rgba(167,139,250,0.2);
}
.sh-hint{font-size:.68rem;font-weight:500;color:#524375;text-transform:none;letter-spacing:0}

/* PREMIUM GLASSMORPHISM GRID & BUTTON DESIGNS */
.lg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.lg-btn, .df-btn, .num-btn, .num-in{
  background: rgba(255, 255, 255, 0.04);
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius:16px;
  cursor:pointer;
  transition:all .25s cubic-bezier(0.4, 0, 0.2, 1);
  color:#f1ecfb;
  font-family:inherit;
  backdrop-filter:blur(12px);
  -webkit-backdrop-filter:blur(12px);
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1), inset 0 1px 1px rgba(255,255,255,0.05);
}

.lg-btn{padding:18px 10px;text-align:center;}
.lg-btn:hover, .df-btn:hover, .num-btn:hover{
  background:rgba(167,139,250,.12);
  border-color: rgba(244,114,182,0.6);
  transform: translateY(-4px) scale(1.02);
  box-shadow:0 8px 20px rgba(0,0,0,0.3);
}
.lg-btn.on, .df-btn.on, .num-btn.on{
  background:linear-gradient(135deg, rgba(167,139,250,.25), rgba(244,114,182,.12));
  border-color:#a78bfa;
  box-shadow:0 0 25px rgba(167,139,250,.35), inset 0 1px 1px rgba(255,255,255,0.2);
  transform:translateY(-1px);
}

.lg-em{font-size:1.6rem;display:block;margin-bottom:6px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15))}
.lg-nm{font-size:.78rem;font-weight:700;color:#d1c4e9}

.topic-grid{display:flex;flex-wrap:wrap;gap:8px}
.topic-btn{
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.06);
  border-radius:99px;
  padding:8px 16px;
  cursor:pointer;
  color:#9a8cb4;
  font-family:inherit;
  font-size:.75rem;
  font-weight:600;
  transition:all .18s;
}
.topic-btn:hover{
  background:rgba(167,139,250,.08);
  border-color:rgba(167,139,250,.3);
  color:#e2d9f3;
}
.topic-btn.on{
  background:rgba(167,139,250,.2);
  border-color:#a78bfa;
  color:#ffffff;
  box-shadow:0 0 14px rgba(167,139,250,.2);
}

.grp{margin-bottom:18px;background:rgba(255,255,255,0.01);padding:14px;border-radius:16px;border:1px solid rgba(255,255,255,0.02)}
.grp:last-child{margin-bottom:0}
.grp-h{font-size:.68rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#c4b5fd;margin-bottom:10px;opacity:.9}
.clear-btn{
  background:none;border:none;color:#6b5994;font-family:inherit;
  font-size:.68rem;font-weight:700;cursor:pointer;padding:4px 6px;text-decoration:none;
  letter-spacing:.5px;transition:color .15s;
}
.clear-btn:hover{color:#f472b6}

.df-row{display:flex;gap:10px}
.qt-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:480px){.qt-row{grid-template-columns:repeat(2,1fr)}}

.num-row{display:flex;gap:10px;flex-wrap:wrap}
.num-btn{flex:1;min-width:58px;padding:14px 8px;font-size:.95rem;font-weight:800}
.num-in{
  flex:1;min-width:90px;padding:12px 16px;
  background:rgba(255,255,255,.01);
  border:1px solid rgba(255,255,255,.08);
  outline:none;font-weight:700;font-size:.9rem;
}
.num-in:focus{border-color:#a78bfa;background:rgba(167,139,250,.05);box-shadow:0 0 12px rgba(167,139,250,0.15)}
.num-in::placeholder{color:#4e3d6f;font-weight:600}

.df-btn{flex:1;padding:16px 12px;text-align:center;}
.df-ic{font-size:1.25rem;display:block;margin-bottom:4px}
.df-nm{font-size:.82rem;font-weight:700;display:block;color:#e2d9f3}
.df-ds{font-size:.65rem;color:#635287;margin-top:3px;font-weight:500}

.tip{
  background:linear-gradient(135deg, rgba(167,139,250,.05), rgba(244,114,182,0.02));
  border:1px solid rgba(167,139,250,.15);
  border-radius:14px;padding:14px 18px;font-size:.78rem;color:#9b8cb8;line-height:1.6;
}
.tip b{color:#c4b5fd;font-weight:700}

.go-btn{
  width:100%;padding:18px;
  background:linear-gradient(135deg,#a78bfa 0%,#f472b6 100%);
  border:none;border-radius:16px;color:#0e0618;
  font-family:inherit;font-size:.95rem;font-weight:800;letter-spacing:2px;
  cursor:pointer;box-shadow:0 6px 24px rgba(167,139,250,.35);
  transition:transform .2s, box-shadow .2s;
}
.go-btn:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(167,139,250,.5)}
.go-btn:active{transform:translateY(-1px)}

/* GAME AREA & HUDS */
.game{display:flex;flex-direction:column;gap:18px;padding-top:6px}
.tbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.05);
  border-radius:16px;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
}
.hts{display:flex;gap:5px;font-size:1.05rem;filter:drop-shadow(0 2px 4px rgba(239,68,68,0.2))}
.pts{font-size:1.25rem;font-weight:800;color:#c4b5fd;text-shadow:0 0 10px rgba(167,139,250,0.3)}
.stk{
  font-size:.75rem;font-weight:800;color:#f59e0b;
  background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.25);
  padding:4px 12px;border-radius:99px;display:none;
  box-shadow:0 2px 8px rgba(245,158,11,0.15);
}

.prg-bar{background:rgba(255,255,255,.04);border-radius:99px;height:6px;overflow:hidden;border:1px solid rgba(255,255,255,0.02)}
.prg-fill{height:100%;background:linear-gradient(90deg,#a78bfa,#f472b6);border-radius:99px;transition:width .45s cubic-bezier(.4,0,.2,1);width:0%}
.prg-lbl{font-size:.65rem;color:#5a4c7a;font-weight:700;margin-top:6px;text-align:right;letter-spacing:1px}

/* THE CONTAINER CARD */
.card{
  background:radial-gradient(circle at top left, #170f28, #110a20);
  border:1px solid rgba(255,255,255,.06);
  border-radius:24px;padding:26px;min-height:200px;
  box-shadow:0 12px 40px rgba(0,0,0,0.3);
}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.q-inner{animation:cardIn .3s cubic-bezier(0.4, 0, 0.2, 1)}

/* LOADING LOOPER */
@keyframes spin{to{transform:rotate(360deg)}}
.ld{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:56px 0;gap:16px}
.sp{width:36px;height:36px;border:3.5px solid rgba(167,139,250,.12);border-top-color:#a78bfa;border-radius:50%;animation:spin .6s linear infinite}
.ld-t{font-size:.7rem;color:#756599;font-weight:700;letter-spacing:2px;text-transform:uppercase}

.q-topic{font-size:.62rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#a78bfa;margin-bottom:12px;opacity:.9}
.qt{font-size:1.1rem;font-weight:600;line-height:1.7;color:#f1ecfb;margin-bottom:20px}

/* OPTIONS ULTRA DESIGN */
.opts{display:flex;flex-direction:column;gap:10px}
.opt{
  display:flex;align-items:center;gap:14px;padding:14px 18px;
  background:rgba(255,255,255,.015);border:1.5px solid rgba(255,255,255,.05);
  border-radius:14px;cursor:pointer;color:#e2d9f3;
  font-family:inherit;font-size:.9rem;font-weight:600;
  text-align:left;transition:all .15s cubic-bezier(0.4, 0, 0.2, 1);width:100%;
}
.opt:not([disabled]):hover{
  background:rgba(167,139,250,.07);
  border-color:rgba(167,139,250,.35);
  color:#ffffff;
  transform:translateX(4px);
}
.opt[disabled]{cursor:default}

/* FEEDBACK COLORS STATE */
.opt.ok{background:rgba(34,197,94,.08);border-color:#22c55e;color:#a7f3d0;box-shadow:0 0 14px rgba(34,197,94,0.15)}
.opt.ng{background:rgba(239,68,68,.08);border-color:#ef4444;color:#fca5a5;box-shadow:0 0 14px rgba(239,68,68,0.15)}
.opt.dm{opacity:.22;transform:scale(0.98)}

.opt-l{
  min-width:26px;height:26px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:800;flex-shrink:0;
  background:rgba(255,255,255,.04);color:#7f6eab;
  transition:all .15s;
}
.opt:hover .opt-l{background:rgba(167,139,250,0.15);color:#c4b5fd}
.opt.ok .opt-l{background:rgba(34,197,94,.15);color:#22c55e}
.opt.ng .opt-l{background:rgba(239,68,68,.15);color:#ef4444}

/* INPUT BLANKS TYPE CSS */
.fill-row{display:flex;gap:10px}
.fill-in{
  flex:1;padding:14px 18px;
  background:rgba(255,255,255,.015);border:1.5px solid rgba(255,255,255,.06);
  border-radius:14px;color:#ffffff;font-family:inherit;font-size:.95rem;font-weight:600;
  outline:none;transition:all .15s;
}
.fill-in:focus{border-color:#a78bfa;background:rgba(167,139,250,.04);box-shadow:0 0 12px rgba(167,139,250,0.15)}
.fill-in.ok{border-color:#22c55e;background:rgba(34,197,94,.08);color:#a7f3d0}
.fill-in.ng{border-color:#ef4444;background:rgba(239,68,68,.08);color:#fca5a5}
.fill-go{
  padding:0 24px;background:linear-gradient(135deg,#a78bfa,#f472b6);
  border:none;border-radius:14px;color:#0e0618;font-family:inherit;
  font-size:.82rem;font-weight:800;letter-spacing:1px;cursor:pointer;
  transition:opacity .15s, transform .15s;
}
.fill-go:hover:not([disabled]){transform:scale(1.02)}
.fill-go[disabled]{opacity:.3;cursor:default}

.ans-reveal{margin-top:12px;font-size:.85rem;color:#34d399;font-weight:700;letter-spacing:0.5px}

@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.expl{
  margin-top:16px;padding:14px 18px;
  background:rgba(167,139,250,.04);border:1px solid rgba(167,139,250,.1);
  border-radius:12px;font-size:.82rem;color:#a394c2;line-height:1.65;display:none;
  animation:fadeUp .25s ease;
}
.expl-ok{color:#34d399;font-weight:800}
.expl-ng{color:#f87171;font-weight:800}

.nx-btn{
  width:100%;padding:16px;background:linear-gradient(135deg,#a78bfa,#f472b6);
  border:none;border-radius:14px;color:#0e0618;
  font-family:inherit;font-size:.9rem;font-weight:800;letter-spacing:1.5px;
  cursor:pointer;box-shadow:0 4px 18px rgba(167,139,250,.25);
  transition:all .15s;display:none;
}
.nx-btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(167,139,250,.4)}

/* END SCORE CARD VIEW */
.end{display:flex;flex-direction:column;align-items:center;text-align:center;gap:24px;padding:30px 0}
.end-ic{font-size:4.2rem;filter:drop-shadow(0 4px 12px rgba(245,158,11,0.2))}
.end-ti{
  font-size:2.2rem;font-weight:900;letter-spacing:-0.5px;
  background:linear-gradient(135deg,#a78bfa,#f472b6);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.end-sc{font-size:3.6rem;font-weight:900;color:#fbbf24;line-height:1;text-shadow:0 0 20px rgba(251,191,36,0.25)}
.end-sl{font-size:.65rem;color:#5a4a7b;font-weight:800;letter-spacing:3px;text-transform:uppercase;margin-top:6px}
.end-grade{font-size:.92rem;font-weight:700;color:#c4b5fd}

.st-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin:8px 0}
.st{
  background:rgba(255,255,255,.015);border:1px solid rgba(255,255,255,.05);
  border-radius:16px;padding:16px 20px;min-width:105px;backdrop-filter:blur(4px);
}
.st-v{font-size:1.4rem;font-weight:800;color:#ffffff}
.st-l{font-size:.6rem;color:#5a4a7b;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-top:4px}

.pa-btn{
  padding:16px 48px;background:linear-gradient(135deg,#a78bfa,#f472b6);
  border:none;border-radius:14px;color:#0e0618;
  font-family:inherit;font-size:.9rem;font-weight:800;letter-spacing:1.5px;
  cursor:pointer;box-shadow:0 4px 18px rgba(167,139,250,.3);
  transition:all .15s;
}
.pa-btn:hover{transform:translateY(-3px);box-shadow:0 10px 28px rgba(167,139,250,.45)}

.footer{text-align:center;font-size:.62rem;color:#3f325c;margin-top:14px;letter-spacing:1px;font-weight:600}

/* FLOATING BG PARTICLES */
.bg-particle {
  position: fixed;
  pointer-events: none;
  z-index: -1;
  color: var(--particle-glow, rgba(167, 139, 250, 0.2));
  font-family: 'Segoe UI', system-ui, monospace;
  font-weight: 800;
  font-size: var(--size, 22px);
  left: var(--x, 50%);
  top: 100vh;
  will-change: transform, opacity;
  animation: floatUp var(--duration, 5s) cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
  text-shadow: 0 0 10px var(--particle-glow, rgba(167, 139, 250, 0.1));
}

@keyframes floatUp {
  0% { transform: translateY(0) scale(0.6) rotate(0deg); opacity: 0; }
  15% { opacity: 0.8; transform: translateY(-20vh) scale(1) rotate(45deg); }
  85% { opacity: 0.8; }
  100% { transform: translateY(-125vh) scale(0.7) rotate(270deg); opacity: 0; }
}
</style>
</head>

<div id="app"></div>

  {
    sub: 'Science', diff: 'Beginner', topic: 'Describing Motion Around Us', type: 'mcq',
    question: 'What does the slope of a distance-time graph represent?',
    options: ['Acceleration', 'Speed', 'Displacement', 'Force'], correct: 1,
    explanation: 'The slope of a distance-time graph represents speed.'
  },
  {
    sub: 'Science', diff: 'Intermediate', topic: 'How Forces Affect Motion', type: 'fill',
    question: 'The mathematical expression of Newton\'s Second Law of Motion is F = ____.',
    answer: 'ma', accept: ['m*a', 'mass * acceleration'],
    explanation: 'Force is directly proportional to the product of mass (m) and acceleration (a).'
  },
  {
    sub: 'English', diff: 'Beginner', topic: 'How I Taught My Grandmother to Read', type: 'mcq',
    question: 'Who is the author of the story "How I Taught My Grandmother to Read"?',
    options: ['Ruskin Bond', 'Sudha Murty', 'R.K. Narayan', 'Vikram Seth'], correct: 1,
    explanation: 'Sudha Murty is the author, sharing a touching personal account of teaching her grandmother.'
  },
  {
    sub: 'Hindi', diff: 'Beginner', topic: 'दो बैलों की कथा', type: 'mcq',
    question: 'प्रेमचंद द्वारा रचित कहानी "दो बैलों की कथा" में बैलों के नाम क्या हैं?',
    options: ['सोना और चांदी', 'हीरा और मोती', 'जय और वीरू', 'राम और श्याम'], correct: 1,
    explanation: 'कहानी के मुख्य पात्र दो बैल हैं जिनका नाम हीरा और मोती है।'
  }
];
</script>

<script>
const SUBJECTS = [
  {name:'Maths',      em:'📐'},
  {name:'Science',    em:'🔬'},
  {name:'History',    em:'🏛️'},
  {name:'Geography', em:'🌍'},
  {name:'Civics',     em:'⚖️'},
  {name:'Economics', em:'💰'},
  {name:'English',    em:'📖'},
  {name:'Hindi',      em:'🪔'}
];

const DIFFS = [
  {name:'Beginner',   ic:'🌱',ds:'Recall & basics'},
  {name:'Intermediate', ic:'⚙️',ds:'Apply & connect'},
  {name:'Advanced',     ic:'🔥',ds:'Think deeper'}
];

const TYPES = [
  {name:'Mixed',      val:'mixed', ic:'🎲', ds:'All types'},
  {name:'MCQ',        val:'mcq',   ic:'🔘', ds:'Multiple choice'},
  {name:'Fill Blank', val:'fill',  ic:'✍️', ds:'Type the answer'},
  {name:'True/False', val:'tf',    ic:'✅', ds:'True or false'}
];

const TOTAL = 10;

let G = {
  sub:'Maths', diff:'Beginner', qtype:'mixed', topics:[], total:TOTAL,
  q:null, sel:null, fb:null,
  score:0, lives:3, streak:0, best:0,
  qn:0, hits:0, used:[], pool:[],
  recent:[], aiAvailable:false, loading:false
};

function triggerBackgroundParticles(subject) {
  const oldParticles = document.querySelectorAll('.bg-particle');
  oldParticles.forEach(p => p.remove());

  let symbols = ['0', '1', 'x', '+', '√'];
  let glowColor = 'rgba(167, 139, 250, 0.08)';

  if (subject === 'Maths') { symbols = ['0', '1', 'x', 'y', '+', '−', '=', '√', 'π']; glowColor = 'rgba(167, 139, 250, 0.25)'; }
  else if (subject === 'Science') { symbols = ['⚛', '🔬', 'H₂O', '🧪', '🧬', '⚡']; glowColor = 'rgba(52, 211, 153, 0.2)'; }
  else if (subject === 'English') { symbols = ['A', 'B', '✍️', '📖', '"', '?', '!']; glowColor = 'rgba(244, 114, 182, 0.2)'; }
  else if (subject === 'Hindi') { symbols = ['क', 'ख', 'अ', 'आ', '🪔', '📜']; glowColor = 'rgba(251, 146, 60, 0.2)'; }

  document.body.style.setProperty('--subject-glow', glowColor);

  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'bg-particle';
      p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.setProperty('--x', Math.random() * 100 + 'vw');
      p.style.setProperty('--size', Math.random() * (30 - 16) + 16 + 'px');
      p.style.setProperty('--duration', Math.random() * (7 - 4) + 4 + 's');
      p.style.setProperty('--particle-glow', glowColor);
      document.body.appendChild(p);
      p.addEventListener('animationend', () => p.remove());
    }, i * 120);
  }
}

const $ = id => document.getElementById(id);

const app = html => { 
  const el = document.getElementById('app');
  if(el) el.innerHTML = html; 
};

function h(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function groupsFor(sub){
  const c = window.CHAPTERS && window.CHAPTERS[sub];
  if (c && !Array.isArray(c) && typeof c === 'object') return c;
  return null;
}
function topicsFor(sub){
  const c = window.CHAPTERS && window.CHAPTERS[sub];
  if (c) {
    if (Array.isArray(c)) return c;
    return Object.keys(c).reduce((acc,g)=>acc.concat(c[g]), []);
  }
  return [];
}

/* HIGH-SPEED DIRECTIONAL REVEAL CONVERSION ENGINE */
function animateTextInContainer(target) {
  if (!target) return;
  let globalCharIndex = 0;
  const directions = ['from-top', 'from-bottom', 'from-left', 'from-right'];

  function recurse(node) {
    if (node.nodeType === Node.TEXT_NODE) {
      const text = node.textContent;
      if (text.trim() === "") return;

      const fragment = document.createDocumentFragment();
      for (let i = 0; i < text.length; i++) {
        const char = text[i];
        if (char === " " || char === "\n" || char === "\t") {
          fragment.appendChild(document.createTextNode(char));
        } else {
          const randomDir = directions[Math.floor(Math.random() * directions.length)];
          const span = document.createElement('span');
          span.className = `anim-char ${randomDir}`;
          span.textContent = char;
          span.style.animationDelay = `${globalCharIndex * 0.06}s`;
          globalCharIndex++;
          fragment.appendChild(span);
        }
      }
      node.parentNode.replaceChild(fragment, node);
    } else if (node.nodeType === Node.ELEMENT_NODE) {
      if (node.classList.contains('lg-em') || node.classList.contains('df-ic') || node.tagName === 'SCRIPT' || node.tagName === 'STYLE' || node.tagName === 'INPUT') {
        return;
      }
      Array.from(node.childNodes).forEach(recurse);
    }
  }
  Array.from(target.childNodes).forEach(recurse);
}

document.addEventListener('click', e=>{
  const t = e.target.closest('[data-a]');
  if(!t) return;
  const a = t.getAttribute('data-a');
  const v = t.getAttribute('data-v');
  if(a==='sub'){ G.sub=v; G.topics=[]; triggerBackgroundParticles(v); renderHome(); animateTextInContainer($('app')); }
  else if(a==='diff'){ G.diff=v; renderHome(); animateTextInContainer($('app')); }
  else if(a==='qtype'){ G.qtype=v; renderHome(); animateTextInContainer($('app')); }
  else if(a==='num'){ G.total=parseInt(v,10); renderHome(); animateTextInContainer($('app')); }
  else if(a==='topic'){ toggleTopic(v); }
  else if(a==='clearTopics'){ G.topics=[]; renderTopics(); }
  else if(a==='start'){ startGame(); }
  else if(a==='ans'){ answer(parseInt(v,10)); }
  else if(a==='submitFill'){ submitFill(); }
  else if(a==='next'){ next(); }
  else if(a==='home'){ renderHome(); animateTextInContainer($('app')); }
});

function chapBtn(t){ return `<button class="topic-btn${G.topics.includes(t)?' on':''}" data-a="topic" data-v="${h(t)}">${h(t)}</button>`; }
function renderTopics(){
  const wrap = $('topics-wrap');
  if(!wrap) return;
  const list = topicsFor(G.sub);
  const groups = groupsFor(G.sub);
  const n = G.topics.length;
  if(list.length===0){ wrap.innerHTML=''; return; }

  const header = `<div class="sh">Chapters ${n>0 ? `<span class="sh-badge">${n} selected</span><button class="clear-btn" data-a="clearTopics">clear</button>` : `<span class="sh-hint">pick some or leave blank</span>`}</div>`;
  let body = groups ? Object.keys(groups).map(g=>`<div class="grp"><div class="grp-h">${h(g)}</div><div class="topic-grid">${groups[g].map(chapBtn).join('')}</div></div>`).join('') : `<div class="topic-grid">${list.map(chapBtn).join('')}</div>`;
  
  wrap.innerHTML = `<div class="topics-wrap">${header}${body}</div>`;
}

function toggleTopic(t){
  const i = G.topics.indexOf(t); if (i===-1) G.topics.push(t); else G.topics.splice(i,1);
  renderTopics();
  animateTextInContainer($('app'));
}

function renderHome(){
  app(`
    <div class="home">
      <div class="brand">
        <h1 class="brand-name">ClassQuest</h1>
        <div class="brand-sub">Class 9 CBSE Core</div>
      </div>
      <div class="grp">
        <div class="sh">Select Subject</div>
        <div class="lg-grid">
          ${SUBJECTS.map(s => `<button class="lg-btn${G.sub === s.name ? ' on' : ''}" data-a="sub" data-v="${h(s.name)}"><span class="lg-em">${s.em}</span><span class="lg-nm">${h(s.name)}</span></button>`).join('')}
        </div>
      </div>
      <div id="topics-wrap"></div>
      <div class="grp">
        <div class="sh">Difficulty Level</div>
        <div class="df-row">
          ${DIFFS.map(d => `<button class="df-btn${G.diff === d.name ? ' on' : ''}" data-a="diff" data-v="${h(d.name)}"><span class="df-ic">${d.ic}</span><span class="df-nm">${h(d.name)}</span><span class="df-ds">${h(d.ds)}</span></button>`).join('')}
        </div>
      </div>
      <div class="grp">
        <div class="sh">Question Type</div>
        <div class="df-row">
          ${TYPES.map(t => `<button class="df-btn${G.qtype === t.val ? ' on' : ''}" data-a="qtype" data-v="${h(t.val)}"><span class="df-ic">${t.ic}</span><span class="df-nm">${h(t.name)}</span><span class="df-ds">${h(t.ds)}</span></button>`).join('')}
        </div>
      </div>
      <div class="grp">
        <div class="sh">Quest Length</div>
        <div class="num-row">
          ${[5, 10, 20].map(n => `<button class="num-btn${G.total === n ? ' on' : ''}" data-a="num" data-v="${n}">${n}</button>join('')}
        </div>
      </div>
      <button class="go-btn" data-a="start">START QUEST</button>
    </div>
  `);
  renderTopics();
}

function startGame() {
  G.score = 0; G.lives = 3; G.streak = 0; G.qn = 0; G.hits = 0;
  let pool = (window.QUESTION_BANK || []).filter(q => q.sub === G.sub);
  if (G.diff) pool = pool.filter(q => q.diff === G.diff);
  if (G.topics.length > 0) pool = pool.filter(q => G.topics.includes(q.topic));
  G.pool = shuffle(pool);
  renderGameLayout();
  next();
}

function renderGameLayout() {
  app(`
    <div class="game">
      <div class="tbar">
        <div class="pts" id="hud-score">0 pts</div>
        <div class="stk" id="hud-streak">0 Streak🔥</div>
        <div class="hts" id="hud-lives">❤️❤️❤️</div>
      </div>
      <div class="prg-bar"><div class="prg-fill" id="hud-progress"></div></div>
      <div class="card" id="game-card"></div>
      <button class="nx-btn" id="next-btn" data-a="next">CONTINUE QUEST</button>
    </div>
  `);
}

function next() {
  if (G.qn >= G.total || G.lives <= 0) return endGame();
  G.qn++; G.sel = null; $('next-btn').style.display = 'none';
  $('hud-progress').style.width = `${(G.qn / G.total) * 100}%`;

  let q = G.pool.pop();
  if (!q) {
    q = {
      sub: G.sub, diff: G.diff, topic: G.topics[0] || 'General', type: 'tf',
      question: `Is review of elements within "${G.sub}" essential for comprehensive grade execution?`,
      answer: true, explanation: 'Systematic overview enforces retrieval metrics.'
    };
  }
  G.q = q;
  renderQuestion();
}

function renderQuestion() {
  const q = G.q;
  let formHtml = '';
  if (q.type === 'mcq') {
    formHtml = `<div class="opts">` + q.options.map((o, idx) => `<button class="opt" data-a="ans" data-v="${idx}"><span class="opt-l">${String.fromCharCode(65 + idx)}</span><span>${h(o)}</span></button>`).join('') + `</div>`;
  } else if (q.type === 'tf') {
    formHtml = `<div class="opts"><button class="opt" data-a="ans" data-v="1"><span class="opt-l">A</span><span>True</span></button><button class="opt" data-a="ans" data-v="0"><span class="opt-l">B</span><span>False</span></button></div>`;
  } else if (q.type === 'fill') {
    formHtml = `<div class="fill-row"><input type="text" id="fillan" class="fill-in" placeholder="Answer..."><button class="fill-go" data-a="submitFill">SUBMIT</button></div><div id="fill-reveal" class="ans-reveal"></div>`;
  }

  $('game-card').innerHTML = `
    <div class="q-inner">
      <div class="q-topic">${h(q.topic)} • ${h(q.diff)}</div>
      <div class="qt">${h(q.question)}</div>
      ${formHtml}
      <div class="expl" id="expl-box"></div>
    </div>
  `;
  animateTextInContainer($('game-card'));
}

function answer(idx) {
  if (G.sel !== null) return; G.sel = idx;
  const q = G.q; let isCorrect = q.type === 'mcq' ? (idx === q.correct) : ((idx === 1) === q.answer);
  
  document.querySelectorAll('.opt').forEach((b, i) => {
    b.setAttribute('disabled', 'true');
    const target = q.type === 'mcq' ? q.correct : (q.answer ? 1 : 0);
    if (i === target) b.classList.add('ok'); else if (i === idx) b.classList.add('ng'); else b.classList.add('dm');
  });
  processOutcome(isCorrect);
}

function submitFill() {
  if (G.sel !== null) return;
  const input = $('fillan'); const userAns = input.value.trim().toLowerCase(); if (!userAns) return;
  G.sel = 1; input.setAttribute('disabled', 'true');
  
  const isCorrect = (userAns === String(G.q.answer).toLowerCase());
  input.classList.add(isCorrect ? 'ok' : 'ng');
  if (!isCorrect) $('fill-reveal').textContent = `Answer: ${G.q.answer}`;
  processOutcome(isCorrect);
}

function processOutcome(isCorrect) {
  const expBox = $('expl-box');
  if (isCorrect) { G.score += 10; G.hits++; G.streak++; expBox.innerHTML = `<span class="expl-ok">Correct!</span> ${h(G.q.explanation)}`; }
  else { G.lives--; G.streak = 0; expBox.innerHTML = `<span class="expl-ng">Incorrect.</span> ${h(G.q.explanation)}`; }

  $('hud-score').textContent = `${G.score} pts`;
  $('hud-lives').textContent = G.lives > 0 ? '❤️'.repeat(G.lives) : '💀';
  $('hud-streak').style.display = G.streak >= 2 ? 'inline-block' : 'none';
  $('hud-streak').textContent = `${G.streak} Streak 🔥`;
  
  expBox.style.display = 'block'; $('next-btn').style.display = 'block';
  animateTextInContainer(expBox);
}

function endGame() {
  app(`<div class="end"><div class="end-ic">🏆</div><h2 class="end-ti">Quest Completed</h2><div class="end-sc">${G.score}</div><button class="pa-btn" data-a="home">PLAY AGAIN</button></div>`);
  animateTextInContainer($('app'));
}

/* INITIALIZER SPLASH ROUTINE CONTROL */
window.addEventListener('DOMContentLoaded', () => {
  const splash = $('intro-splash');
  if (splash) {
    splash.textContent = "Created by Pawan";
    animateTextInContainer(splash);
  }

  setTimeout(() => {
    renderHome(); 
    triggerBackgroundParticles(G.sub);
    animateTextInContainer($('app')); 
  }, 3300);
});
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%}
body{

#app{width:100%;max-width:640px}
/* HOME */

.sh-hint{font-size:.58rem;font-weight:400;color:#4a3a6b;text-transform:none;letter-spacing:0}
.lg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.lg-btn,.df-btn{

}

.topic-btn.on{background:rgba(167,139,250,.16);border-color:#a78bfa;color:#c4b5fd;box-shadow:0 0 10px rgba(167,139,250,.16)}
.grp{margin-bottom:14px}

.df-row{display:flex;gap:8px}

.end{display:flex;flex-direction:column;align-items:center;text-align:center;gap:20px;padding:40px 0}

.end-sc{font-size:3rem;font-weight:800;color:#fbbf24;line-height:1}

.end-grade{font-size:.85rem;font-weight:700;color:#c4b5fd}
.st-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}

.st-v{font-size:1.3rem;font-weight:800;color:#a78bfa}
.st-l{font-size:.58rem;color:#4a3a6b;font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:3px}
.pa-btn{
  padding:15px 42px;background:linear-gradient(118deg,#a78bfa,#f472b6);
  border:none;border-radius:12px;color:#15071a;
  font-family:inherit;font-size:.86rem;font-weight:800;letter-spacing:1.5px;
  cursor:pointer;box-shadow:0 4px 18px rgba(167,139,250,.3);
  transition:transform .14s,box-shadow .14s;
}
.pa-btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(167,139,250,.42)}
.footer{text-align:center;font-size:.58rem;color:#33274d;margin-top:6px;letter-spacing:.5px}
</style>

<body>
<div id="app"></div>

<!-- ============================================================
     QUESTION BANK — Class 9 CBSE / NCERT
     Each entry: {sub, diff, topic, question, options[], correct, explanation}
     Fully offline — no server, no API key, no internet needed.
     ============================================================ -->
<script>
/* ============================================================================
   ClassQuest — Question Bank  (Class 9 · CBSE / NCERT)
   ----------------------------------------------------------------------------
   Common fields for EVERY question:
     sub         subject (must match a name in SUBJECTS)
     diff        'Beginner' | 'Intermediate' | 'Advanced'
     topic       chapter name (used as the chapter filter)
     question    the question text
     explanation short note shown after answering   (optional)

   THREE question types are supported. Set 'type' to one of: 'mcq' | 'tf' | 'fill'
   (if you leave 'type' out, it is auto-detected).

   1) MCQ  → multiple choice
      {sub:'Maths', diff:'Beginner', topic:'The World of Numbers', type:'mcq',
       question:'Which of these is irrational?',
       options:['√2','0.25','3/7','−5'],
       correct:0,                      // index (0-based) of the right option
       explanation:'√2 is non-terminating, non-repeating.'}

   2) TRUE / FALSE
      {sub:'Science', diff:'Beginner', topic:'Sound Waves: Characteristics and Applications',
       type:'tf',
       question:'Sound can travel through vacuum.',
       answer:false,                   // true or false
       explanation:'Sound needs a medium to travel.'}

   3) FILL IN THE BLANK
      {sub:'Maths', diff:'Beginner', topic:'The World of Numbers',
       type:'fill',
       question:'The value of π up to two decimals is ____.',
       answer:'3.14',                  // the correct answer (case-insensitive)
       accept:['3.14159'],             // optional: extra accepted answers
       explanation:'π ≈ 3.14.'}
   ============================================================================ */
/* ----------------------------------------------------------------------------
   CHAPTERS — the official book chapter list for each subject.
   Whatever is listed here shows up as a chapter button (even chapters that
   don't have questions yet). Subjects not listed here fall back to deriving
   chapters from the question bank automatically.

   A subject can be EITHER:
     • a flat array of chapter names, OR
     • an object of groups:  { "Physics": [...], "Chemistry": [...], ... }
       (used for Science, which shows Physics / Chemistry / Biology groups).
   ---------------------------------------------------------------------------- */
window.CHAPTERS = {
  // Maths (Ganita Manjari)
  'Maths': [
    'Orienting Yourself: The Use of Coordinates',
    'Introduction to Linear Polynomials',
    'The World of Numbers',
    'Exploring Algebraic Identities',
    "I'm Up and Down, and Round and Round",
    'Measuring Space: Perimeter and Area',
    'The Mathematics of Maybe: Introduction to Probability',
    'Predicting What Comes Next: Exploring Sequences and Progressions'
  ],

  // Science (Exploration) — grouped into Physics / Chemistry / Biology
  'Science': {
    'Physics': [
      'Describing Motion Around Us',
      'How Forces Affect Motion',
      'Work, Energy, and Simple Machines',
      'Sound Waves: Characteristics and Applications'
    ],
    'Chemistry': [
      'Exploring Mixtures and their Separation',
      'Journey Inside the Atom',
      'Atomic Foundations of Matter'
    ],
    'Biology': [
      'Cell: The Building Block of Life',
      'Tissues in Action',
      'Reproduction: How Life Continues',
      'Patterns in Life: Diversity and Classification',
      'Earth as a System: Energy, Matter, and Life'
    ],
    'General': [
      'Exploration: Entering the World of Secondary Science'
    ]
  },

  // English (Kaveri) — single book, 16 chapters
  'English': [
    'How I Taught My Grandmother to Read',
    'The Pot Maker',
    'Winds of Change',
    'Vitamin-M',
    'The World of Limitless Possibilities',
    'Twin Melodies',
    'Carrier of Words',
    'Follow That Dream',
    'Bharat Our Land',
    'Gifts of Grace - Honouring Our Vocations',
    'Canvas of Soil',
    'I Cannot Remember My Mother',
    'Nine Gold Medals',
    'A Friend Found in Music',
    'Believe in Yourself',
    'Words'
  ],

  // Hindi (Ganga) — single book, 12 chapters
  'Hindi': [
    'दो बैलों की कथा',
    'क्या लिखूं?',
    'संवादहीन',
    'ऐसी भी बातें होती हैं (लता मंगेशकर से साक्षात्कार)',
    'आखिरी चट्टान तक',
    'रीढ़ की हड्डी',
    'में और मेरा देश',
    'रैदास के पद',
    'राम-परशुराम-लक्ष्मण संवाद',
    'भारती, जय, विजयोत्सव!',
    'झाँसी की रानी',
    'घर की याद'
  ]
};


/* ----------------------------------------------------------------------------
   QUESTION_BANK — add your questions here (MCQ / True-False / Fill-in-the-blank).
   See the format examples in the header comment above. Empty for now.
   ---------------------------------------------------------------------------- */
window.QUESTION_BANK = [

];

</script>

<script>
const SUBJECTS = [
  {name:'Maths',     em:'📐'},
  {name:'Science',   em:'🔬'},
  {name:'History',   em:'🏛️'},
  {name:'Geography', em:'🌍'},
  {name:'Civics',    em:'⚖️'},
  {name:'Economics', em:'💰'},
  {name:'English',   em:'📖'},
  {name:'Hindi',     em:'🪔'}
];

const DIFFS = [
  {name:'Beginner',     ic:'🌱',ds:'Recall & basics'},
  {name:'Intermediate', ic:'⚙️',ds:'Apply & connect'},
  {name:'Advanced',     ic:'🔥',ds:'Think deeper'}
];

/* Question types the player can pick on the home screen.
   'Mixed' = any type. The others restrict the quiz to one type. */
const TYPES = [
  {name:'Mixed',      val:'mixed', ic:'🎲', ds:'All types'},
  {name:'MCQ',        val:'mcq',   ic:'🔘', ds:'Multiple choice'},
  {name:'Fill Blank', val:'fill',  ic:'✍️', ds:'Type the answer'},
  {name:'True/False', val:'tf',    ic:'✅', ds:'True or false'}
];

/* Default number of questions. The player can change this on the home
   screen (G.total). TOTAL stays as the default/initial value. */
const TOTAL = 10;
const MAX_TOTAL = 50;   // upper safety cap for the custom count

let G = {
  sub:'Maths', diff:'Beginner', qtype:'mixed', topics:[], total:TOTAL,
  q:null, sel:null, fb:null,
  score:0, lives:3, streak:0, best:0,
  qn:0, hits:0, used:[], pool:[],
  recent:[],            // last few question texts, sent to AI to avoid repeats
  aiAvailable:false,    // detected at boot via /api/status
  loading:false
};

/* ── AI helpers ──────────────────────────────────────────────────────────
   Ask our own backend whether an AI key is configured. If yes, we fetch
   fresh questions from /api/question; if anything fails we silently fall
   back to the offline question bank so the game never breaks. */
async function detectAI(){
  try{
    const r = await fetch('/api/status', {cache:'no-store'});
    const j = await r.json();
    G.aiAvailable = !!j.ai;
  }catch(_){ G.aiAvailable = false; }
}

async function fetchAIQuestion(){
  try{
    const r = await fetch('/api/question', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        sub:G.sub, diff:G.diff, qtype:G.qtype, topics:G.topics, recent:G.recent
      })
    });
    const j = await r.json();
    if(j && j.question && j.question.question){
      const q = j.question;
      q.sub = G.sub; q.diff = G.diff;       // tag with current selection
      return q;
    }
  }catch(_){}
  return null;
}

/* ── tiny helpers ── */
const $ = id => document.getElementById(id);
const app = html => { document.getElementById('app').innerHTML = html; };
function h(s){ return String(s).replace(/[&<>"']/g, c => (
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

/* ── chapter helpers ──
   CHAPTERS[sub] can be EITHER:
     • a flat array of chapter names, OR
     • an object of { "Group Name": [chapter, chapter, ...] } for grouping
       (e.g. Science → Physics / Chemistry / Biology).
   topicsFor() always returns a FLAT list of chapter names (for filtering),
   groupsFor() returns the grouped form (or null if not grouped). */
function groupsFor(sub){
  const c = window.CHAPTERS && window.CHAPTERS[sub];
  if (c && !Array.isArray(c) && typeof c === 'object') return c;
  return null;
}
function topicsFor(sub){
  const c = window.CHAPTERS && window.CHAPTERS[sub];
  if (c) {
    if (Array.isArray(c)) return c;
    // grouped object → flatten all groups into one list
    return Object.keys(c).reduce((acc,g)=>acc.concat(c[g]), []);
  }
  const bank = (window.QUESTION_BANK || []);
  const set = [];
  bank.forEach(q=>{ if(q.sub===sub && !set.includes(q.topic)) set.push(q.topic); });
  return set;
}

/* ── EVENT DELEGATION ── */
document.addEventListener('click', e=>{
  const t = e.target.closest('[data-a]');
  if(!t) return;
  const a = t.getAttribute('data-a');
  const v = t.getAttribute('data-v');
  if(a==='sub'){ G.sub=v; G.topics=[]; renderHome(); }
  else if(a==='diff'){ G.diff=v; renderHome(); }
  else if(a==='qtype'){ G.qtype=v; renderHome(); }
  else if(a==='num'){ G.total=parseInt(v,10); renderHome(); }
  else if(a==='topic'){ toggleTopic(v); }
  else if(a==='clearTopics'){ G.topics=[]; renderTopics(); }
  else if(a==='start'){ startGame(); }
  else if(a==='ans'){ answer(parseInt(v,10)); }
  else if(a==='submitFill'){ submitFill(); }
  else if(a==='next'){ next(); }
  else if(a==='home'){ renderHome(); }
});

/* ── custom "number of questions" input ──
   We listen on the document so it keeps working after re-renders. We only
   clamp+repaint when the field loses focus (so typing isn't interrupted). */
document.addEventListener('input', e=>{
  if(e.target && e.target.id==='numin'){
    const n = parseInt(e.target.value,10);
    // only update for a sensible number; ignore empty / half-typed values
    if(!isNaN(n) && n >= 1) G.total = Math.min(MAX_TOTAL, n);
  }
});
document.addEventListener('change', e=>{
  if(e.target && e.target.id==='numin'){
    let n = parseInt(e.target.value,10);
    if(isNaN(n) || n < 1) n = TOTAL;     // blank or invalid → back to default
    G.total = Math.min(MAX_TOTAL, n);
    renderHome();          // repaint so the quick-pick buttons highlight correctly
  }
});

/* ── RENDER TOPICS (chapters) ── */
function chapBtn(t){
  return `<button class="topic-btn${G.topics.includes(t)?' on':''}" data-a="topic" data-v="${h(t)}">${h(t)}</button>`;
}
function renderTopics(){
  const wrap = $('topics-wrap');
  if(!wrap) return;
  const list = topicsFor(G.sub);
  const groups = groupsFor(G.sub);
  const n = G.topics.length;
  if(list.length===0){ wrap.innerHTML=''; return; }

  const header = `<div class="sh">
      Chapters
      ${n>0
        ? `<span class="sh-badge">${n} selected</span><button class="clear-btn" data-a="clearTopics">clear</button>`
        : `<span class="sh-hint">pick some or leave blank for all</span>`}
    </div>`;

  let body;
  if(groups){
    // grouped view: each group gets its own sub-heading + chapter pills
    body = Object.keys(groups).map(g=>`
      <div class="grp">
        <div class="grp-h">${h(g)}</div>
        <div class="topic-grid">${groups[g].map(chapBtn).join('')}</div>
      </div>`).join('');
  } else {
    body = `<div class="topic-grid">${list.map(chapBtn).join('')}</div>`;
  }

  wrap.innerHTML = `<div class="topics-wrap">${header}${body}</div>`;
}

function toggleTopic(t){
  const i = G.topics.indexOf(t);
  if (i===-1) G.topics.push(t); else G.topics.splice(i,1);
  renderTopics();
}

/* ── RENDER GAME SHELL ── */
function renderGameShell(){
  const topicLabel = G.topics.length>0 ? ` · ${G.topics.length} ch.` : '';
  app(`<div class="game">
    <div class="tbar">
      <div class="hts" id="hts">❤️❤️❤️</div>

    </div>

    <button class="nx-btn" id="nx" data-a="next">NEXT QUESTION →</button>
  </div>`);

/* ── RENDER END ── */
function renderEnd(win){
  const pct = G.qn>0 ? Math.round(G.hits/G.qn*100) : 0;
  let grade='Keep practising! 💪', ic = win?'🏆':'💀';
  if(pct>=90) grade='Outstanding! Topper material 🌟';
  else if(pct>=70) grade='Great job! 🎉';
  else if(pct>=50) grade='Good effort — revise a bit more 📖';
  app(`<div class="end">
    <div class="end-ic">${ic}</div>
    <div class="end-ti">${win?'Quest Complete!':'Game Over'}</div>
    <div>
      <div class="end-sc">${G.score}</div>
      <div class="end-sl">Points Earned</div>
    </div>
    <div class="end-grade">${grade}</div>
    <div class="st-row">
      <div class="st"><div class="st-v">${G.hits}/${G.qn}</div><div class="st-l">Correct</div></div>
      <div class="st"><div class="st-v">${pct}%</div><div class="st-l">Accuracy</div></div>
      <div class="st"><div class="st-v">${G.best}🔥</div><div class="st-l">Best Streak</div></div>
      <div class="st"><div class="st-v">${G.lives}❤️</div><div class="st-l">Lives Left</div></div>
    </div>
    <button class="pa-btn" data-a="home">PLAY AGAIN</button>
  </div>`);
}

/* ── UPDATE HUD ── */
function hud(){
  const hts=$('hts'); if(hts) hts.textContent=[0,1,2].map(i=>i<G.lives?'❤️':'🖤').join('');
  const pts=$('pts'); if(pts) pts.textContent=`${G.score} pts`;
  const stk=$('stk'); if(stk){ if(G.streak>=2){ stk.textContent=`🔥 ${G.streak}× streak`; stk.style.display='block'; } else { stk.style.display='none'; } }
  const pf=$('pf');   if(pf)  pf.style.width=`${Math.min(G.qn/G.total*100,100)}%`;
  const pl=$('pl');   if(pl){ const tl=G.topics.length>0?` · ${G.topics.length} ch.`:''; pl.textContent=`${G.sub}${tl} · ${G.diff} · Q${G.qn}/${G.total}`; }
}

/* ── BUILD THE POOL ── filter bank by subject+difficulty(+chapters),
   gracefully broaden if too few match so the game never stalls. */
/* Work out a question's type. If 'type' is missing we infer it:
   has options[] → mcq, has true/false answer → tf, else fill. */
function qType(q){
  if(q.type) return q.type;
  if(Array.isArray(q.options) && q.options.length) return 'mcq';
  if(typeof q.answer === 'boolean') return 'tf';
  return 'fill';
}

function buildPool(){
  const bank = (window.QUESTION_BANK || []);
  const bySub = bank.filter(q => q.sub === G.sub);
  // honour the chosen question type ('mixed' = allow all)
  const typeOk = q => G.qtype==='mixed' || qType(q)===G.qtype;

  let pool = bySub.filter(q =>
    typeOk(q) &&
    q.diff === G.diff &&
    (G.topics.length === 0 || G.topics.includes(q.topic))
  );
  if (pool.length < G.total) {                     // broaden: drop chapter filter
    const extra = bySub.filter(q => typeOk(q) && q.diff === G.diff && !pool.includes(q));
    pool = pool.concat(extra);
  }
  if (pool.length < G.total) {                      // broaden: any difficulty (keep type)
    const extra = bySub.filter(q => typeOk(q) && !pool.includes(q));
    pool = pool.concat(extra);
  }
  if (pool.length === 0) pool = bank.slice();      // last resort: anything
  return shuffle(pool);
}

function pickFromBank(){
  if(!G.pool.length) G.pool = buildPool();
  let next = G.pool.find(q => !G.used.includes(q));
  if(!next){ G.used = []; next = G.pool[0]; }
  if(next){ G.pool = G.pool.filter(q => q !== next); G.used.push(next); }
  return next || null;
}

/* ── RENDER CURRENT QUESTION ── */
const TYPE_LABEL = {mcq:'MCQ', tf:'True / False', fill:'Fill in the blank'};
function renderQuestion(){
  const card=$('card');
  if(!card||!G.q) return;
  const t = qType(G.q);

  let bodyHTML;
  if(t==='fill'){
    // Fill in the blank — text input + check button
    bodyHTML = `<div class="fill-row">
        <input class="fill-in" id="fillin" type="text" autocomplete="off"
               placeholder="Type your answer…" />
        <button class="fill-go" id="fillgo" data-a="submitFill">CHECK</button>
      </div>`;
  } else {
    // MCQ or True/False — both render as clickable option buttons
    const opts = t==='tf' ? ['True','False'] : (G.q.options||[]);
    bodyHTML = `<div class="opts">
      ${opts.map((o,i)=>`
        <button class="opt" data-a="ans" data-v="${i}">
          <span class="opt-l">${t==='tf' ? (i===0?'T':'F') : String.fromCharCode(65+i)}</span>
          <span>${h(o)}</span>
        </button>`).join('')}
    </div>`;
  }

  card.innerHTML=`<div class="q-inner">
    <div class="q-topic">${h(G.q.topic||G.sub)} · ${TYPE_LABEL[t]||''}</div>
    <div class="qt">${h(G.q.question)}</div>
    ${bodyHTML}
    <div class="expl" id="expl"></div>
  </div>`;

  // let Enter submit a fill-in answer
  if(t==='fill'){
    const inp=$('fillin');
    if(inp){
      inp.focus();
      inp.addEventListener('keydown',e=>{ if(e.key==='Enter') submitFill(); });
    }
  }
}

/* ── LOAD NEXT QUESTION ── */
async function loadQ(){
  G.sel=null; G.fb=null; G.loading=true;
  const nx=$('nx'); if(nx) nx.style.display='none';
  const card=$('card'); if(card) card.innerHTML=loader();

  let q = null;

  // 1) Try a fresh AI question when the server reports a key is set.
  if(G.aiAvailable) q = await fetchAIQuestion();

  // 2) Fallback to the offline bank (also the default with no server).
  if(!q){
    if(!G.aiAvailable) await new Promise(r=>setTimeout(r,250)); // tiny pause for UX
    q = pickFromBank();
  }

  if(!q){
    if(card) card.innerHTML=`<div class="qt">No questions available for this selection.<br><br>
      ${G.aiAvailable ? 'AI request failed and the offline bank is empty.' : 'Add questions to the bank, or run the server with an AI key.'}</div>`;
    G.loading=false;
    return;
  }

  G.q=q; G.qn++;
  // remember recent question text so the AI avoids repeats
  G.recent.push((q.question||'').slice(0,80));
  if(G.recent.length>8) G.recent.shift();

  hud();
  renderQuestion();
  G.loading=false;
}

/* spinner shown while a question loads (esp. while waiting on the AI) */
function loader(){
  return `<div class="ld"><div class="sp"></div>
    <div class="ld-t">${G.aiAvailable ? 'Generating question…' : 'Loading…'}</div></div>`;
}

/* Shared scoring + feedback after any answer.
   isOk = was it right; revealText = optional "correct answer was…" line. */
function scoreAnswer(isOk, revealText){
  if(isOk){
    G.score += G.streak>=2 ? 20 : 10;
    G.streak++; G.best=Math.max(G.best,G.streak); G.hits++; G.fb='ok';
  } else {
    G.lives=Math.max(0,G.lives-1); G.streak=0; G.fb='ng';
  }
  hud();
  setTimeout(()=>{
    const expl=$('expl');
    if(expl){
      const tag = G.fb==='ok'
        ? `<span class="expl-ok">✓ Correct! </span>`
        : `<span class="expl-ng">✗ Incorrect. </span>`;
      const reveal = (!isOk && revealText)
        ? `<div class="ans-reveal">Answer: ${h(revealText)}</div>` : '';
      expl.innerHTML = tag + (G.q.explanation ? h(G.q.explanation) : '') + reveal;
      expl.style.display='block';
    }
    const nx=$('nx');
    if(nx){ nx.textContent = (G.qn>=G.total || G.lives<=0) ? 'SEE RESULTS →' : 'NEXT QUESTION →'; nx.style.display='block'; }
  },360);
}

/* ── HANDLE MCQ / TRUE-FALSE ANSWER ── */
function answer(idx){
  if(G.sel!==null||!G.q) return;
  const t = qType(G.q);
  const opts = t==='tf' ? ['True','False'] : (G.q.options||[]);
  if(idx<0||idx>=opts.length) return;

  // correct index: TF uses q.answer (true/false), MCQ uses q.correct
  const correct = t==='tf' ? (G.q.answer===true ? 0 : 1) : G.q.correct;
  const isOk = idx===correct;
  G.sel=idx;

  document.querySelectorAll('.opt').forEach((btn,i)=>{
    btn.disabled=true;
    if(i===correct)        btn.className='opt ok';
    else if(i===idx)       btn.className='opt ng';
    else                   btn.className='opt dm';
  });

  scoreAnswer(isOk, opts[correct]);
}

/* ── HANDLE FILL-IN-THE-BLANK ANSWER ──
   Accepts q.answer (string) and optional q.accept (array of extra valid answers).
   Matching is case-insensitive and ignores surrounding spaces. */
function submitFill(){
  if(G.sel!==null||!G.q) return;
  const inp=$('fillin'); if(!inp) return;
  const typed=(inp.value||'').trim();
  if(!typed) return;                 // ignore empty submits
  G.sel=typed;

  const norm = s => String(s).trim().toLowerCase().replace(/\s+/g,' ');
  const valid = [G.q.answer].concat(G.q.accept||[]).filter(x=>x!=null).map(norm);
  const isOk = valid.includes(norm(typed));

  inp.disabled=true;
  inp.className='fill-in '+(isOk?'ok':'ng');
  const go=$('fillgo'); if(go) go.disabled=true;

  scoreAnswer(isOk, G.q.answer);
}

/* ── NEXT / START ── */
function next(){
  if(G.lives<=0)  { renderEnd(false); return; }
  if(G.qn>=G.total) { renderEnd(true);  return; }
  loadQ();
}

function startGame(){
  // safety: make sure the question count is a valid whole number ≥ 1
  let n = parseInt(G.total, 10);
  if(isNaN(n) || n < 1) n = TOTAL;
  G.total = Math.min(MAX_TOTAL, n);
  Object.assign(G,{score:0,lives:3,streak:0,best:0,qn:0,hits:0,used:[],recent:[],q:null,sel:null,fb:null});
  G.pool = buildPool();
  renderGameShell();
  loadQ();
}

/* ── BOOT ── */
renderHome();
detectAI().then(()=>renderHome());   // re-render once we know if AI is on
</script>
